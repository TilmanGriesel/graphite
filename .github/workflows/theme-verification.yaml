name: Theme Verification
# IMPORTANT: do NOT add a workflow-level `paths:` filter here. When a required workflow is
# skipped by path filtering its checks stay "Pending" forever and block the merge. Gate at the
# JOB level with `if:` conditionals instead (a skipped JOB reports Success). This workflow runs
# on every PR/push and calls the SAME scripts that the local hooks and `make verify` run, so the
# agent's local verdict and the merge gate are the same artifact.
#
# Each gate is its own job (its own status check). Make these the required checks in branch
# protection. There is intentionally NO aggregate sticky-comment job: it cannot post on fork
# PRs (read-only GITHUB_TOKEN), and each job already writes a GITHUB_STEP_SUMMARY.
on:
  pull_request:
  push:
    branches: [main, develop]
permissions:
  contents: read
jobs:
  drift:
    name: Source ↔ generated drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - name: check_drift
        run: |
          set -o pipefail
          scripts/check_drift.sh | tee -a "$GITHUB_STEP_SUMMARY"
  tokens:
    name: Token quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - name: validate_tokens
        run: |
          set -o pipefail
          python3 tools/validate_tokens.py | tee -a "$GITHUB_STEP_SUMMARY"
  contrast:
    name: WCAG contrast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - name: check_contrast
        run: |
          set -o pipefail
          python3 tools/check_contrast.py --all | tee -a "$GITHUB_STEP_SUMMARY"
  yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - name: validate-yaml
        run: make validate-yaml
